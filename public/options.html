<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Extension Options</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 16px;
        max-width: 1280px;
        margin-left: auto;
        margin-right: auto;
      }
      #status {
        position: sticky;
        top: 0;
        z-index: 10;
        margin-bottom: 12px;
        padding: 10px 12px;
        border-radius: 6px;
        background: #ecfdf3;
        color: #166534;
        border: 1px solid #bbf7d0;
        font-size: 13px;
        display: none;
      }
      #status.visible {
        display: block;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .tab {
        padding: 8px 12px;
        border: 1px solid #ccc;
        background: #f7f7f7;
        cursor: pointer;
        border-radius: 6px;
        font-size: 14px;
      }
      .tab.active {
        background: #1f2937;
        color: #fff;
        border-color: #1f2937;
      }
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }
      .bold {
        font-weight: bold;
      }
      .section-title {
        font-weight: bold;
        margin: 12px 0 8px;
      }
      .list {
        margin: 10px 0 0;
        padding: 0;
        list-style: none;
      }
      .list-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        margin-bottom: 8px;
        background: #fafafa;
      }
      .list-item .summary {
        font-size: 13px;
      }
      .list-item .actions {
        display: flex;
        gap: 8px;
      }
      .edit-panel {
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 10px;
        margin: 8px 0 12px;
        background: #fff;
      }
      .edit-actions {
        display: flex;
        gap: 8px;
        margin-top: 6px;
      }
      .list-item span {
        font-size: 13px;
      }
      .link-button {
        background: none;
        border: none;
        color: #2563eb;
        padding: 0;
        cursor: pointer;
        font-size: 14px;
        text-decoration: underline;
      }
      .hidden {
        display: none;
      }
      
      label {
        display: block;
        font-size: 14px;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 8px;
        font-size: 14px;
        margin-bottom: 10px;
      }
      select {
        width: 100%;
        padding: 8px;
        font-size: 14px;
        margin-bottom: 10px;
      }
      .row {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        gap: 15px;
        margin-bottom: 10px;
        width: 100%;
        align-items: flex-end;
      } 
      .row .field {
        flex: 1;
        min-width: 0;
      }
      .row .field input {
        margin-bottom: 0;
      }
      .row .field select {
        margin-bottom: 0;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 42px;
        height: 24px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
        margin: 0;
        padding: 0;
      }
      .switch-slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background-color: #d1d5db;
        border-radius: 999px;
        transition: background-color 0.2s ease;
      }
      .switch-slider::before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        top: 3px;
        background-color: #fff;
        border-radius: 50%;
        transition: transform 0.2s ease;
      }
      .switch input:checked + .switch-slider {
        background-color: #2563eb;
      }
      .switch input:checked + .switch-slider::before {
        transform: translateX(18px);
      }
      @media (max-width: 520px) {
        .row {
          flex-direction: column;
        }
        .row .field + .field {
          margin-left: 0;
        }
      }
      button {
        padding: 8px 12px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="status"></div>
    <div class="tabs" role="tablist" aria-label="Options tabs">
      <button class="tab active" data-tab="import-export" role="tab" aria-selected="true">General</button>
      <button class="tab" data-tab="manufacturers" role="tab" aria-selected="false">Manufacturers</button>
      <button class="tab" data-tab="products" role="tab" aria-selected="false">Products</button>
      <button class="tab" data-tab="packages" role="tab" aria-selected="false">Packages</button>
      <button class="tab" data-tab="postages" role="tab" aria-selected="false">Postages</button>
    </div>

    <section id="tab-manufacturers" class="tab-panel" role="tabpanel">
      <div class="section-title">Manufacturers</div>
      <ul id="manufacturer-list" class="list"></ul>
      <button id="add-manufacturer-link" class="link-button" type="button">Add a new manufacturer</button>

      <div id="add-manufacturer-form" class="hidden">
        <label for="a-contact">* Contact</label>
        <input id="a-contact" type="text" placeholder="Company/Individual name" />

        <div class="row">
          <div class="field">
            <label for="a-address1">* Address Line 1</label>
            <input id="a-address1" type="text" />
          </div>
          <div class="field">
            <label for="a-address2">Address Line 2(optional)</label>
            <input id="a-address2" type="text" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="a-city">* City</label>
            <input id="a-city" type="text" />
          </div>
          <div class="field">
            <label for="a-postal">* Postal Code</label>
            <input id="a-postal" type="text" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="a-province">* Province/State</label>
            <input id="a-province" type="text" />
          </div>
          <div class="field">
            <label for="a-country">* Country</label>
            <input id="a-country" type="text" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="a-phone">Phone(optional)</label>
            <input id="a-phone" type="text" />
          </div>
          <div class="field">
            <label for="a-email">Email(optional)</label>
            <input id="a-email" type="email" />
          </div>
        </div>

        <button id="add-manufacturer">Add Manufacturer</button>
        <button id="cancel-add" type="button">Cancel</button>
      </div>
    </section>

    <section id="tab-products" class="tab-panel" role="tabpanel">
      <div class="section-title">Products</div>
      <div class="row">
        <div class="field">
          <label for="p-default-product-enabled">Enable Default Product?</label>
        </div>
        <div class="field">
          <label class="switch">
            <input id="p-default-product-enabled" type="checkbox" />
            <span class="switch-slider"></span>
          </label>
        </div>
      </div>
      <ul id="product-list" class="list"></ul>
      <button id="add-product-link" class="link-button" type="button">Add another product</button>

      <div id="add-product-form" class="hidden">
        <div class="row">
          <div class="field">
            <label for="p-name">Name</label>
            <input id="p-name" type="text" />
          </div>
          <div class="field">
            <label for="p-name-is-regex">Enable Regex?</label>
            <label class="switch">
              <input id="p-name-is-regex" type="checkbox" />
              <span class="switch-slider"></span>
            </label>
          </div>
          <div class="field">
            <label for="p-name-is-case-sensitive">Case Sensitive?</label>
            <label class="switch">
              <input id="p-name-is-case-sensitive" type="checkbox" />
              <span class="switch-slider"></span>
            </label>
          </div>
        </div>

        <label for="p-description">Description</label>
        <input id="p-description" type="text" />

        <label for="p-manufacturer">Manufacturer</label>
        <select id="p-manufacturer"></select>

        <div class="row">
          <div class="field">
            <label for="p-weight">Weight</label>
            <input id="p-weight" type="number" step="0.1" min="0" />
          </div>
          <div class="field">
            <label for="p-weight-unit">Weight Unit</label>
            <select id="p-weight-unit">
              <option value="g">g</option>
              <option value="kg">kg</option>
              <option value="lb">lb</option>
              <option value="oz">oz</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="p-origin-country">Origin Country</label>
            <input id="p-origin-country" type="text" />
          </div>
          <div class="field">
            <label for="p-hs-code">HS Code</label>
            <input id="p-hs-code" type="text" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="p-steel">Steel</label>
            <input id="p-steel" type="number" step="1" min="0" />
          </div>
          <div class="field">
            <label for="p-aluminum">Aluminum</label>
            <input id="p-aluminum" type="number" step="1" min="0" />
          </div>
        </div>

        <button id="add-product">Add Product</button>
        <button id="cancel-add-product" type="button">Cancel</button>
      </div>
    </section>

    <section id="tab-packages" class="tab-panel" role="tabpanel">
      <div class="section-title">Packages</div>
      <ul id="package-list" class="list"></ul>
      <button id="add-package-link" class="link-button" type="button">Add another package</button>

      <div id="add-package-form" class="hidden">
        <div class="row">
          <div class="field">
            <label for="k-from-weight">From Weight</label>
            <input id="k-from-weight" type="number" step="0.1" min="0" />
          </div>
          <div class="field">
            <label for="k-to-weight">To Weight</label>
            <input id="k-to-weight" type="number" step="0.1" min="0" />
          </div>
          <div class="field">
            <label for="k-weight-unit">Weight Unit</label>
            <select id="k-weight-unit">
              <option value="g" selected>g</option>
              <option value="kg">kg</option>
              <option value="lb">lb</option>
              <option value="oz">oz</option>
            </select>
          </div>
        </div>

        <label for="k-type">Type</label>
        <select id="k-type">
          <option value="letter">letter</option>
          <option value="envelope">envelope</option>
          <option value="thick_envelope">thick_envelope</option>
          <option value="parcel" selected>parcel</option>
        </select>

        <div class="row">
          <div class="field">
            <label for="k-length">Length</label>
            <input id="k-length" type="number" step="0.1" min="0" />
          </div>
          <div class="field">
            <label for="k-width">Width</label>
            <input id="k-width" type="number" step="0.1" min="0" />
          </div>
          <div class="field">
            <label for="k-height">Height</label>
            <input id="k-height" type="number" step="0.1" min="0" />
          </div>
          <div class="field">
            <label for="k-length-unit">Length Unit</label>
            <select id="k-length-unit">
              <option value="in" selected>in</option>
              <option value="cm">cm</option>
            </select>
          </div>
        </div>

        <button id="add-package">Add Package</button>
        <button id="cancel-add-package" type="button">Cancel</button>
      </div>
    </section>

    <section id="tab-postages" class="tab-panel" role="tabpanel">
      <div class="section-title">Postages</div>
      <ul id="postage-list" class="list"></ul>
      <button id="add-postage-link" class="link-button" type="button">Add another postage</button>

      <div id="add-postage-form" class="hidden">
        <label for="s-name">Name</label>
        <input id="s-name" type="text" />

        <button id="add-postage">Add Postage</button>
        <button id="cancel-add-postage" type="button">Cancel</button>
      </div>
    </section>

    <section id="tab-import-export" class="tab-panel active" role="tabpanel">
      <div class="section-title">General</div>

      <div class="edit-panel">
        <label for="general-client-id">ChitChats client ID</label>
        <input id="general-client-id" type="text" placeholder="e.g. 1234567" />
        <div class="edit-actions">
          <button id="save-client-id" type="button">Save</button>
        </div>
      </div>

      <div class="edit-panel">
        <div class="summary">Export all settings from `chrome.storage.sync` to a JSON file for backup or transfer.</div>
        <div class="edit-actions">
          <button id="export-settings" type="button">Export</button>
        </div>
      </div>

      <div class="edit-panel">
        <div class="summary">Import settings from a JSON file and replace all values in `chrome.storage.sync`.</div>
        <div class="edit-actions">
          <button id="import-settings" type="button">Import</button>
        </div>
      </div>

      <input id="import-file" type="file" accept="application/json,.json" class="hidden" />
    </section>

    <script src="options/index.js"></script>
  </body>
</html>
